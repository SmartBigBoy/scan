<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>智能扫描 - 文档扫描助手</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=PingFang+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 首页 -->
    <div id="home" class="page active">
        <div class="header">
            <h1 class="title">智能扫描</h1>
            <p class="subtitle">快速扫描，轻松分享</p>
        </div>
        
        <div class="main-content">
            <div class="scan-area" id="scanArea">
                <div class="scan-frame">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                    <div class="scan-line"></div>
                </div>
                <p class="scan-hint">点击下方按钮开始扫描</p>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" id="scanBtn">
                    <span class="btn-icon">📷</span>
                    <span class="btn-text">扫描文稿</span>
                </button>
                <button class="btn-secondary" id="galleryBtn">
                    <span class="btn-icon">📁</span>
                    <span class="btn-text">从相册选择</span>
                </button>
            </div>
            
            <div class="features">
                <div class="feature-item">
                    <span class="feature-icon">✨</span>
                    <span class="feature-text">智能识别</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">📄</span>
                    <span class="feature-text">PDF导出</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🔗</span>
                    <span class="feature-text">便捷分享</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🔒</span>
                    <span class="feature-text">隐私安全</span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>本地处理，隐私无忧</p>
        </div>
    </div>
    
    <!-- 扫描页面 -->
    <div id="scanner" class="page">
        <div class="scanner-header">
            <button class="back-btn" id="backBtn">← 返回</button>
            <h2 class="scanner-title">扫描文档</h2>
            <button class="flash-btn" id="flashBtn">⚡</button>
        </div>
        
        <div class="video-container" id="videoContainer">
            <video id="video" autoplay playsinline></video>
            <canvas id="detectOverlay"></canvas>
            <canvas id="canvas" style="display: none;"></canvas>
            <div class="detect-status" id="detectStatus">对准文档</div>
        </div>
        
        <div class="scanner-actions">
            <button class="capture-btn" id="captureBtn">
                <span class="capture-ring"></span>
                <span class="capture-dot"></span>
            </button>
            <p class="capture-hint">点击拍照</p>
        </div>
    </div>
    
    <!-- 预览页面 -->
    <div id="preview" class="page">
        <div class="preview-header">
            <button class="back-btn" id="previewBackBtn">← 返回</button>
            <h2 class="preview-title">预览</h2>
            <button class="confirm-btn" id="confirmBtn">确定</button>
        </div>
        
        <div class="preview-content">
            <img id="previewImage" src="" alt="扫描预览">
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="auto">自动</button>
            <button class="filter-btn" data-filter="document">文档</button>
            <button class="filter-btn" data-filter="idcard">证件</button>
            <button class="filter-btn" data-filter="original">原色</button>
        </div>

        <div class="adjust-bar" id="adjustBar">
            <div class="adjust-item">
                <span class="adjust-label">亮度</span>
                <input type="range" class="adjust-slider" id="brightnessSlider" min="-50" max="50" value="0">
                <span class="adjust-value" id="brightnessValue">0</span>
            </div>
            <div class="adjust-item">
                <span class="adjust-label">对比度</span>
                <input type="range" class="adjust-slider" id="contrastSlider" min="-50" max="50" value="0">
                <span class="adjust-value" id="contrastValue">0</span>
            </div>
        </div>
        
        <div class="preview-actions">
            <button class="action-btn" id="rotateBtn">
                <span class="action-icon">↻</span>
                <span class="action-text">旋转</span>
            </button>
            <button class="action-btn" id="cropBtn">
                <span class="action-icon">✂️</span>
                <span class="action-text">裁剪</span>
            </button>
            <button class="action-btn" id="deleteBtn">
                <span class="action-icon">🗑️</span>
                <span class="action-text">删除</span>
            </button>
        </div>
    </div>
    
    <!-- 结果页面 -->
    <div id="result" class="page">
        <div class="result-header">
            <button class="back-btn" id="resultBackBtn">← 返回</button>
            <h2 class="result-title">扫描完成</h2>
            <button class="more-btn" id="moreBtn">设置</button>
        </div>
        
        <div class="result-content">
            <div class="document-list" id="documentList">
            </div>
        </div>

        <div class="page-settings" id="pageSettings" style="display:none;">
            <div class="setting-item">
                <span class="setting-label">页面方向</span>
                <select id="pageOrientation" class="setting-select">
                    <option value="portrait">纵向</option>
                    <option value="landscape">横向</option>
                </select>
            </div>
            <div class="setting-item">
                <span class="setting-label">显示页码</span>
                <label class="switch">
                    <input type="checkbox" id="pageNumberToggle" checked>
                    <span class="switch-slider"></span>
                </label>
            </div>
            <div class="setting-item">
                <span class="setting-label">页边距</span>
                <select id="pageMargin" class="setting-select">
                    <option value="0">无</option>
                    <option value="10" selected>小</option>
                    <option value="20">中</option>
                    <option value="30">大</option>
                </select>
            </div>
        </div>

        <div class="download-bar">
            <button class="download-btn" id="downloadPdfBtn">
                <span class="download-icon">📄</span>
                <span class="download-text">PDF</span>
            </button>
            <button class="download-btn" id="downloadPngBtn">
                <span class="download-icon">�️</span>
                <span class="download-text">PNG</span>
            </button>
            <button class="download-btn" id="downloadJpgBtn">
                <span class="download-icon">📷</span>
                <span class="download-text">JPG</span>
            </button>
        </div>
        
        <div class="result-actions">
            <button class="result-btn secondary" id="rescanBtn">
                <span class="result-icon">🔄</span>
                <span class="result-text">重新扫描</span>
            </button>
            <button class="result-btn secondary" id="shareBtn">
                <span class="result-icon">📤</span>
                <span class="result-text">分享</span>
            </button>
            <button class="result-btn secondary" id="continueBtn">
                <span class="result-icon">➕</span>
                <span class="result-text">继续扫描</span>
            </button>
        </div>
    </div>
    
    <!-- 分享弹窗 -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>分享文档</h3>
                <button class="modal-close" id="shareClose">×</button>
            </div>
            <div class="share-options">
                <button class="share-option" id="shareQQ">
                    <span class="share-icon">🐧</span>
                    <span class="share-text">QQ</span>
                </button>
                <button class="share-option" id="shareWechat">
                    <span class="share-icon">💬</span>
                    <span class="share-text">微信</span>
                </button>
                <button class="share-option" id="shareWeibo">
                    <span class="share-icon">📱</span>
                    <span class="share-text">微博</span>
                </button>
                <button class="share-option" id="shareOther">
                    <span class="share-icon">⋯</span>
                    <span class="share-text">更多</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- 加载提示 -->
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>处理中...</p>
    </div>
    
    <!-- 裁剪页面 -->
    <div id="cropper" class="page">
        <div class="cropper-header">
            <button class="cropper-back-btn" id="cropperBackBtn">←</button>
            <h2 class="cropper-title">裁剪</h2>
            <button class="cropper-confirm-btn" id="cropperConfirmBtn">应用</button>
        </div>
        
        <div class="crop4-container" id="crop4Container">
            <canvas id="crop4Canvas"></canvas>
        </div>
        
        <div class="cropper-footer4">
            <button class="crop4-tool-btn" id="crop4FitBtn">
                <span class="crop4-icon">⊞</span>
                <span>适应</span>
            </button>
            <button class="crop4-tool-btn" id="crop4ResetBtn">
                <span class="crop4-icon">↺</span>
                <span>重置</span>
            </button>
            <button class="crop4-tool-btn" id="crop4RotateBtn">
                <span class="crop4-icon">↻</span>
                <span>旋转</span>
            </button>
        </div>
    </div>
    
    <!-- 添加到桌面按钮和弹窗 -->
    <div class="add-to-home-screen" id="addToHomeBtn"></div>
    <div class="add-to-home-modal" id="addToHomeModal">
        <div class="add-to-home-content">
            <h3>添加到桌面</h3>
            <p>将智能扫描添加到手机桌面，方便快速访问</p>
            <ol class="add-to-home-steps">
                <li>点击浏览器右上角的菜单按钮</li>
                <li>选择"添加到主屏幕"或"安装应用"</li>
                <li>确认添加，图标将出现在桌面</li>
            </ol>
            <button class="add-to-home-close" id="addToHomeClose">知道了</button>
        </div>
    </div>
    
    <script async src="https://docs.opencv.org/4.9.0/opencv.js" id="opencvScript" onload="onOpenCvReady()"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="opencv-scanner.js"></script>
    <script src="app.js"></script>
</body>
</html>
